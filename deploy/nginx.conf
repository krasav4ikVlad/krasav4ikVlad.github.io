# nginx-конфиг для nodewiki.info + scripts.nodewiki.info
#
# Установка:
#   cp deploy/nginx.conf /etc/nginx/sites-available/nodewiki.info
#   ln -s /etc/nginx/sites-available/nodewiki.info /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d nodewiki.info -d www.nodewiki.info -d scripts.nodewiki.info
#
# Certbot после успешного выпуска сертификатов сам добавит ssl-блоки и редирект 80->443.

# === Главный домен — портал nodewiki.info ==================================
server {
    listen 80;
    listen [::]:80;
    server_name nodewiki.info www.nodewiki.info;

    root /var/www/nodewiki.info;
    index index.php;

    # Закрываем БД скриптов и конфиг с хэшем пароля от прямого доступа
    location ~ ^/(data|includes)(/|$) { deny all; return 404; }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php-fpm.sock;
    }

    # статика на год
    location ~* \.(css|js|png|jpe?g|svg|woff2?|ico)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    client_max_body_size 2M;
}

# === Поддомен scripts.nodewiki.info — панель bash-скриптов =================
# Pretty URLs:
#   /         -> scripts.php (публичный список)
#   /admin    -> script_admin.php (админка)
#   /<slug>   -> s.php?slug=<slug> (сырой bash для curl)
server {
    listen 80;
    listen [::]:80;
    server_name scripts.nodewiki.info;

    root /var/www/nodewiki.info;

    location ~ ^/(data|includes)(/|$) { deny all; return 404; }

    location = / {
        rewrite ^ /scripts.php last;
    }
    location = /admin {
        rewrite ^ /script_admin.php last;
    }
    location = /admin/ {
        rewrite ^ /script_admin.php last;
    }

    # /<slug> -> /s.php?slug=<slug>; всё, что не slug — отдаём как есть (404 для несуществующих)
    location ~ "^/([a-z0-9][a-z0-9-]{0,63})/?$" {
        rewrite ^ /s.php?slug=$1 last;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php-fpm.sock;

        # /s.php не должен кешироваться (это раздача скриптов, может меняться)
        location = /s.php {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/run/php/php-fpm.sock;
            add_header Cache-Control "no-store" always;
        }
    }

    location ~* \.(css|js|png|jpe?g|svg|woff2?|ico)$ {
        expires 1d;
        access_log off;
    }

    client_max_body_size 2M;
}
